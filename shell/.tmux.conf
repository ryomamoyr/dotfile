# tmux configuration

# プレフィックスをC-jへ
set -g prefix C-j
unbind C-b
bind C-j send-prefix

# ウィンドウ/ペイン番号を1始まり
set -g base-index 1
set -g pane-base-index 1

# マウス有効
set -g mouse on

# ホイールスクロールの飛びを抑える
# 代替スクリーン上（Neovim等）はアプリ側へイベントを渡す
bind -n WheelUpPane if-shell -F "#{alternate_on}" "send-keys -M" "if-shell -F '#{pane_in_mode}' 'send-keys -X -N 1 scroll-up' 'copy-mode; send-keys -X -N 1 scroll-up'"
bind -n WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "if-shell -F '#{pane_in_mode}' 'send-keys -X -N 1 scroll-down' ''"
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# 256色
set -g default-terminal "screen-256color"

# 透過環境での描画残り防止（ウィンドウ切替時にフル再描画）
set-hook -g after-select-window 'refresh-client'

# アクティビティ通知
setw -g monitor-activity on
set -g visual-activity on

# コピー系はvi
setw -g mode-keys vi

# ペイン分割（記号）
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# ペイン分割（v=水平, s=垂直。作業ディレクトリ継承）
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'

# ペイン移動（h/j/k/l）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ウィンドウ移動（Shift+←/→）
bind -n S-Left previous-window
bind -n S-Right next-window

# 設定再読込（r / R）
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# ステータスバー
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# 履歴行数
set -g history-limit 5000

# コピー操作（Spaceで入る / pで貼り付け）
bind Space copy-mode
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"  # macOS

# パススルー許可
set -g allow-passthrough on

# デタッチ（dが効かない場合の代替）
bind D detach-client

# セッション終了
bind X confirm-before -p "Kill session? (y/n)" kill-session
